<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
        }

        form {
            background-color: white;
            width: 300px;
            margin: 100px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #1877f2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0f5dc2;
        }

        a {
            text-decoration: none;
            color: #1877f2;
        }
    </style>

</head>
<body>

<h2>Sign In</h2>

<form>
    <label>Email:</label><br>
    <input type="email" name="email" required placeholder="Enter your email"><br>

    <label>Password:</label><br>
    <input type="password" name="password" required minlength="6" placeholder="At least 6 characters"><br>

    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="signup.html">Sign Up</a></p>

</body>
</html>
