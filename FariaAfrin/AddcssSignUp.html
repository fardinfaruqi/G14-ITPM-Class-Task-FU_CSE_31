<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
        }

        form {
            background-color: white;
            width: 300px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e7e34;
        }

        a {
            text-decoration: none;
            color: #1877f2;
        }
    </style>

</head>
<body>

<h2>Sign Up</h2>

<form>
    <label>Username:</label><br>
    <input type="text" name="username" required minlength="3" maxlength="15" placeholder="3-15 characters"><br>

    <label>Email:</label><br>
    <input type="email" name="email" required placeholder="Enter valid email"><br>

    <label>Password:</label><br>
    <input type="password" name="password" required minlength="6" placeholder="At least 6 characters"><br>

    <label>Confirm Password:</label><br>
    <input type="password" name="confirm_password" required minlength="6" placeholder="Re-enter password"><br>

    <button type="submit">Register</button>
</form>

<p>Already have an account? <a href="login.html">Sign In</a></p>

</body>
</html>
